awards:
  - title: Raft Consensus Algorithm
    url: https://github.com/R4hulR/raft-consensus
    date: '2025-05-01'
    awarder: Personal Project
    summary: |
      Implemented Raft consensus from scratch — leader election with randomized timeouts, log replication with majority quorum commits, and automatic failover on leader crash. Built a TCP/HTTP transport layer using FastAPI for inter-node communication and a live browser visualization showing node states, term numbers, and state machine in real time.
      **Tech:** Python, FastAPI, Distributed Systems
  - title: Gossip Protocol – Peer-to-Peer Failure Detector
    url: https://github.com/R4hulR/gossip-protocol
    date: '2025-04-01'
    awarder: Personal Project
    summary: |
      Built a gossip-based distributed failure detector with epidemic propagation over UDP, decentralised membership tracking, eventual consistency via heartbeat merge, and sub-15s failure detection across N nodes converging in O(log N) rounds.
      **Tech:** Python, UDP Sockets, Threading, Distributed Systems
  - title: Enterprise RAG System for Document Intelligence
    url: https://github.com/R4hulR/RAG

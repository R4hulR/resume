    summary: |
      Production-ready RAG API for semantic search over PDFs using Google's Gemma LLM, with async ingestion into ChromaDB and deployment on AWS EC2 via Docker Compose + Nginx.
      **Tech:** FastAPI, Docker, AWS, ChromaDB, LangChain
